name: Update Android Store Listing

on:
  push:
    branches: [master]
    paths:
      - 'fastlane/metadata/android/**'
  workflow_dispatch:

env:
  FASTLANE_SKIP_DOCS: '1'
  FASTLANE_OPT_OUT_USAGE: '1'

jobs:
  push-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      - run: bundle exec fastlane android metadata
        env:
          SUPPLY_JSON_KEY_DATA: ${{ secrets.PLAY_STORE_KEY_JSON }}
